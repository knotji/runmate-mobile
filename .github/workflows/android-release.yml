name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      distribute:
        description: Distribute the signed APK with Firebase App Distribution
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      RUNMATE_KEYSTORE_PASSWORD: ${{ secrets.RUNMATE_KEYSTORE_PASSWORD }}
      RUNMATE_KEY_ALIAS: ${{ secrets.RUNMATE_KEY_ALIAS }}
      RUNMATE_KEY_PASSWORD: ${{ secrets.RUNMATE_KEY_PASSWORD }}
      RUNMATE_KEYSTORE_FILE: app/runmate-release.jks
      FIREBASE_APP_ID: "1:276482893444:android:5643c0971817db76a584d1"
      FIREBASE_TESTERS: jirayuknot55@gmail.com

    steps:
      - name: Check out the release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate required secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            GOOGLE_SERVICES_JSON_BASE64
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
            RUNMATE_KEYSTORE_PASSWORD
            RUNMATE_KEY_ALIAS
            RUNMATE_KEY_PASSWORD
          )
          if [[ "${GITHUB_REF_TYPE}" == "tag" || "${{ inputs.distribute }}" == "true" ]]; then
            required+=(FIREBASE_SERVICE_ACCOUNT_JSON)
          fi
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Restore Android release files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/runmate-release.jks
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          chmod 600 android/app/runmate-release.jks android/app/google-services.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_name="${GITHUB_REF_NAME#v}"
          else
            version_name="$(node -p "require('./package.json').version")"
          fi
          version_code=$((1000 + $(git rev-list --count HEAD)))
          echo "RUNMATE_VERSION_NAME=${version_name}" >> "$GITHUB_ENV"
          echo "RUNMATE_VERSION_CODE=${version_code}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=RunMate ${version_name} (${version_code}) from ${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test.unit -- --run

      - name: Run lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Sync Android project
        run: npx cap sync android

      - name: Build signed APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [[ -z "$apksigner_path" ]]; then
            echo "::error::apksigner was not found in the Android SDK"
            exit 1
          fi
          "$apksigner_path" verify --verbose android/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runmate-android-${{ env.RUNMATE_VERSION_NAME }}-${{ env.RUNMATE_VERSION_CODE }}
          if-no-files-found: error
          retention-days: 30
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Authenticate to Firebase
        if: github.ref_type == 'tag' || inputs.distribute == true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Distribute signed APK to testers
        if: github.ref_type == 'tag' || inputs.distribute == true
        run: >-
          npx firebase-tools appdistribution:distribute
          android/app/build/outputs/apk/release/app-release.apk
          --app "$FIREBASE_APP_ID"
          --testers "$FIREBASE_TESTERS"
          --release-notes "$RELEASE_NOTES"
