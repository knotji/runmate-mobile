apply plugin: 'com.android.application'

def runMatePackage = new groovy.json.JsonSlurper().parse(rootProject.file('../package.json'))
def runMateVersionName = System.getenv('RUNMATE_VERSION_NAME') ?: runMatePackage.version
def configuredVersionCode = System.getenv('RUNMATE_VERSION_CODE')
def gitCommitCount = providers.exec {
    workingDir rootProject.projectDir.parentFile
    commandLine 'git', 'rev-list', '--count', 'HEAD'
}.standardOutput.asText.get().trim().toInteger()
def runMateVersionCode = configuredVersionCode ? configuredVersionCode.toInteger() : 1000 + gitCommitCount
def signingPropertiesFile = rootProject.file('keystore.properties')
def signingProperties = new Properties()
if (signingPropertiesFile.exists()) {
    signingPropertiesFile.withInputStream { signingProperties.load(it) }
}
def signingStoreFile = System.getenv('RUNMATE_KEYSTORE_FILE') ?: signingProperties.getProperty('storeFile')
def signingStorePassword = System.getenv('RUNMATE_KEYSTORE_PASSWORD') ?: signingProperties.getProperty('storePassword')
def signingKeyAlias = System.getenv('RUNMATE_KEY_ALIAS') ?: signingProperties.getProperty('keyAlias')
def signingKeyPassword = System.getenv('RUNMATE_KEY_PASSWORD') ?: signingProperties.getProperty('keyPassword')
def hasReleaseSigning = [signingStoreFile, signingStorePassword, signingKeyAlias, signingKeyPassword].every { it }
def requestedReleaseBuild = gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') }
if (requestedReleaseBuild && !hasReleaseSigning) {
    throw new GradleException('Release signing is not configured. Run: npm run android:signing:setup')
}

android {
    namespace = "com.runmate.mobile"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.runmate.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode runMateVersionCode
        versionName runMateVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile rootProject.file(signingStoreFile)
                storePassword signingStorePassword
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
